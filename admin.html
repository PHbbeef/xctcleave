<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单提交示例</title>
    <link rel="stylesheet" type="text/css" href="./admin.css">
</head>
<body style="width: 100%; height: 100%;">
    <div style="text-align: center;">
        <form class="userForm" id="userForm">
            用户信息表单
            <br>
            <div style="margin-top: 10px;">
                <label for="number">学号:</label>
                <input type="text" id="number" name="number" required>
                <br>
                <label for="name">姓名:</label>
                <input type="name" id="name" name="name" required>
            </div>

                <div style="margin-top: 10px;">
                    <label for="name">请假开始日期:</label>
                    <input type="date" id="time1" name="time1" value="" />
                    <input type="time" id="time1-1" name="time1-1" value="" />
                </div>

                <div style="margin-top: 10px;">
                    <label for="name">请假截至日期:</label>
                    <input type="date" id="time2" name="time2" value="" />
                    <input type="time" id="time2-2" name="time2-2" value="" />
                </div>

                 <div style="margin-top: 10px;">
                    <label for="name">提交、通过日期:</label>
                    <input type="date" id="time3" name="time3" value="" />
                    <input type="time" id="time3-3" name="time3" value="" />
                </div>

                <div style="margin-top: 10px;">
                    <label for="name">请假原因:</label>
                    <input type="name" id="cause" name="cause" required>
                </div>
            <br>
            <button class="button" style="padding: 5px 30px; margin-top: 30px;" type="submit">提交</button>
            <br>
            <br>
            <br>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
